<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Execution Flow</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f8fafc;
      color: #0f172a;
    }

    main {
      width: min(720px, 92vw);
      padding: 2rem;
      border-radius: 12px;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin-top: 0;
      color: #1e3a8a;
    }

    p {
      line-height: 1.5;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #0f172a;
        color: #e2e8f0;
      }

      main {
        background: #0b1220;
        border: 1px solid #334155;
        box-shadow: 0 10px 30px rgba(2, 6, 23, 0.35);
      }

      h1 {
        color: #93c5fd;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Execution Flow</h1>
    <p>Your GitHub Pages site is live.</p>
    <p>Edit <code>index.html</code> in this repository to customize this page.</p>
  </main>
</body>
</html>
